name: "Build Kokoroid"

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  # Job 1: 运行测试
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test --stacktrace --info

  # Job 2: 构建和打包，依赖于测试 job
  build:
    runs-on: ubuntu-latest
    needs: test  # 只有 test job 成功后才执行
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build All Modules
        run: ./gradlew build

      - name: Build Fat Jar (Core Only)
        run: ./gradlew :core:shadowjar

      - name: Compile Kotlin
        run: ./gradlew :test-extension:compileKotlin --info --stacktrace

      - name: Collect Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Kokoroid
          path: |
            core/build/libs/*.jar
            core-api/build/libs/*.jar
            adapter-api/build/libs/*.jar
            driver-api/build/libs/*.jar
            plugin-api/build/libs/*.jar
            transport-api/build/libs/*.jar