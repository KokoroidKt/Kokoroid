name: Publish Dokka API to GitHub Pages

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Dokka HTML
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Remove unspecified versions
        run: |
          rm -rf docs/api/unspecified
          rm -rf docs/api/undefined
          rm -rf docs/api/null

      - name: Prepare CNAME
        run: echo "kdoc.kokoroidkt.dev" > docs/api/CNAME

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/api
          clean: false # Set to false to keep historical versions
